<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Soccorso Web API - Swagger UI</title>

    <link
        rel="stylesheet"
        href="webjars/swagger-ui/5.31.0/swagger-ui.css"
    >

    <style>
        html {
            box-sizing: border-box;
            overflow-y: scroll;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        body {
            margin: 0;
            background-color: #fafafa;
        }
    </style>
</head>

<body>

    <div id="swagger-ui"></div>

    <script src="webjars/swagger-ui/5.31.0/swagger-ui-bundle.js"></script>
    <script src="webjars/swagger-ui/5.31.0/swagger-ui-standalone-preset.js"></script>

    <script>
        window.addEventListener("load", function () {

            SwaggerUIBundle({
                url: "/soccorso_Web_SWA/rest/openapi.json",

                dom_id: "#swagger-ui",

                deepLinking: true,

                displayRequestDuration: true,

                filter: true,

                tryItOutEnabled: true,

                persistAuthorization: true,

                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],

                layout: "StandaloneLayout"
            });

        });
    </script>

</body>
</html>
