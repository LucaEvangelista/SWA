<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Lista operatori</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
</head>

<body>

    <main class="container py-4">

        <h1 class="mb-4">
            Lista operatori
        </h1>

        <!-- ================= FILTRI ================= -->
        <div class="row g-3 align-items-end mb-4">

            <div class="col-md-4">

                <label
                    for="filtro-stato-operatori"
                    class="form-label">

                    Filtra per stato
                </label>

                <select
                    id="filtro-stato-operatori"
                    class="form-select">

                    <option value="tutti">
                        Tutti
                    </option>

                    <option value="libero">
                        Liberi
                    </option>

                    <option value="occupato">
                        Occupati
                    </option>

                </select>

            </div>

            <div class="col-md-3">

                <label
                    for="dimensione-pagina"
                    class="form-label">

                    Operatori per pagina
                </label>

                <select
                    id="dimensione-pagina"
                    class="form-select">

                    <option value="5">
                        5
                    </option>

                    <option
                        value="10"
                        selected>

                        10
                    </option>

                    <option value="20">
                        20
                    </option>

                    <option value="50">
                        50
                    </option>

                </select>

            </div>

            <div class="col-md-5 text-md-end">

                <span
                    id="totale-operatori"
                    class="text-muted">

                    Operatori trovati: 0
                </span>

            </div>

        </div>
        <!-- =============== FINE FILTRI =============== -->


        <!-- ================= TABELLA ================= -->
        <div class="table-responsive">

            <table
                class="table table-bordered table-striped align-middle">

                <thead class="table-light">

                    <tr>

                        <th>Nome</th>

                        <th>Cognome</th>

                        <th>Email</th>

                        <th>Data di nascita</th>

                        <th>Stato</th>

                        <th class="text-center">
                            Azioni
                        </th>

                    </tr>

                </thead>

                <tbody id="corpo-tabella-operatori">

                    <tr>

                        <td
                            colspan="6"
                            class="text-center text-muted">

                            Caricamento operatori...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
        <!-- =============== FINE TABELLA =============== -->


        <!-- ================= PAGINAZIONE ================= -->
        <nav
            class="d-flex justify-content-center align-items-center gap-3 mt-3"
            aria-label="Paginazione operatori">

            <button
                type="button"
                id="pagina-precedente"
                class="btn btn-outline-primary"
                disabled>

                Precedente
            </button>

            <span
                id="informazioni-paginazione"
                class="fw-semibold">

                Pagina 0 di 0
            </span>

            <button
                type="button"
                id="pagina-successiva"
                class="btn btn-outline-primary"
                disabled>

                Successiva
            </button>

        </nav>
        <!-- =============== FINE PAGINAZIONE =============== -->


        <!-- ================= ERRORI ================= -->
        <div
            id="messaggio-errore"
            class="alert alert-danger d-none mt-4"
            role="alert">
        </div>

    </main>


    <script
        src="/soccorso_Web_SWA/js/SWAscript/OpeScript.js">
    </script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>

</body>

</html>
