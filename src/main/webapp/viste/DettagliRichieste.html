<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Richiesta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row mb-4">
            <div class="col">
                <h1 class="h3">Dettaglio richiesta</h1>
                <p class="text-muted">Visualizza le informazioni complete della richiesta selezionata.</p>
            </div>

            <div class="col text-end">
                <a href="ListaRichieste.html" class="btn btn-secondary">
                    Torna alla lista
                </a>
            </div>
        </div>

        <!-- Messaggio errore -->
        <div id="messaggio-errore" class="alert alert-danger d-none"></div>

        <!-- Messaggio caricamento -->
        <div id="messaggio-caricamento" class="alert alert-info">
            Caricamento richiesta in corso...
        </div>

        <!-- Card dettaglio richiesta -->
        <div id="card-richiesta" class="card shadow-sm d-none">

            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    Richiesta #<span id="richiesta-id"></span>
                </h5>
            </div>

            <div class="card-body">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Nome persona:</strong>
                        <p id="richiesta-nome" class="mb-0"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Email:</strong>
                        <p id="richiesta-email" class="mb-0"></p>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Indirizzo:</strong>
                        <p id="richiesta-indirizzo" class="mb-0"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Fase:</strong>
                        <p id="richiesta-fase" class="mb-0"></p>
                    </div>
                </div>

                <div class="mb-3">
                    <strong>Descrizione:</strong>
                    <p id="richiesta-descrizione" class="mb-0"></p>
                </div>

                <hr>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <strong>Creata il:</strong>
                        <p id="richiesta-created-at" class="mb-0"></p>
                    </div>

                    <div class="col-md-4">
                        <strong>Avviata il:</strong>
                        <p id="richiesta-working-at" class="mb-0"></p>
                    </div>

                    <div class="col-md-4">
                        <strong>Chiusa il:</strong>
                        <p id="richiesta-closed-at" class="mb-0"></p>
                    </div>
                </div>

				<div class="row mb-3">
	
	                <div class="col-md-4">
	                    <strong>Codice richiesta:</strong>
	                    <p id="richiesta-uuid" class="mb-0"></p>
	                </div>
	                
					<div id="contenitore-rifiuta" class="col-md-4">
					    <button id="btn-rifiuta" class="btn btn-danger" onclick="rifiutaRichiesta()">
					        Rifiuta richiesta
					    </button>
					</div>
	                
					<div id="contenitore-crea-missione" class="col-md-4 d-none">
					    <button id="btn-crea-missione" class="btn btn-success">
					        Crea missione
					    </button>
					</div>
	                
					<div id="contenitore-vai-missione" class="col-md-4">
					    <button id="btn-vai-missione" class="btn btn-primary">
					        Vai alla missione
					    </button>
					</div>
			
				</div>
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="/soccorso_Web_SWA/js/SWAscript/DettagliRichieste.js"></script>

</body>
</html>
