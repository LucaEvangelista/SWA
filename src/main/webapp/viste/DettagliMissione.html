<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Richiesta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row mb-4">
            <div class="col">
                <h1 class="h3">Dettaglio missione</h1>
                <p class="text-muted">Visualizza le informazioni complete della missione selezionata.</p>
            </div>

            <div class="col text-end">
                <a href="ListaMissioni.html" class="btn btn-secondary">
                    Torna alla lista
                </a>
            </div>
        </div>

        <!-- Messaggio errore -->
        <div id="messaggio-errore" class="alert alert-danger d-none"></div>

        <!-- Messaggio caricamento -->
        <div id="messaggio-caricamento" class="alert alert-info">
            Caricamento missione in corso...
        </div>

        <!-- Card dettaglio missione -->
        <div id="card-missione" class="card shadow-sm d-none">

            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    Missione #<span id="missione-id"></span>
                </h5>
            </div>

            <div class="card-body">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Obiettivo: </strong>
                        <p id="obiettivo-missione" class="mb-0"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Posizione: </strong>
                        <p id="posizione-missione" class="mb-0"></p>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Stuatus: </strong>
                        <p id="stato-missione" class="mb-0"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Nome squadra</strong>
                        <p id="squadra-missione" class="mb-0"></p>
                    </div>
                </div>

                <hr>

				<div class="row mb-3">
	                
					<div id="contenitore-terminazione" class="col-md-4">
					    <button id="btn-termina" class="btn btn-danger" onclick="terminaMissione()">
					        Termina Missione
					    </button>
					</div>

				</div>
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="/soccorso_Web_SWA/js/SWAscript/DettagliMissione.js"></script>

</body>
</html>
