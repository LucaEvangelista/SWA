<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Nuova richiesta di soccorso</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="../js/SWAscript/NuovaRichiesta.js" defer></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Soccorso Web</a>
    </div>
</nav>

<main class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 id="titolo-pagina" class="mb-0">Nuova richiesta di soccorso</h4>
                </div>

                <div class="card-body">

                    <div id="messaggio" class="alert d-none" role="alert"></div>

                    <form id="form-richiesta">

                        <div class="mb-3">
                            <label for="nomePersona" class="form-label">Nome e cognome</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="nomePersona" 
                                name="nomePersona"
                                placeholder="Inserisci il tuo nome"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="mailPersona" class="form-label">Email</label>
                            <input 
                                type="email" 
                                class="form-control" 
                                id="mailPersona" 
                                name="mailPersona"
                                placeholder="esempio@email.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="indirizzo" class="form-label">Indirizzo dell'emergenza</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="indirizzo" 
                                name="indirizzo"
                                placeholder="Via, numero civico"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="descrizione" class="form-label">Descrizione dell'emergenza</label>
                            <textarea 
                                class="form-control" 
                                id="descrizione" 
                                name="descrizione"
                                rows="5"
                                placeholder="Descrivi brevemente la situazione"
                                required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="reset" class="btn btn-secondary">
                                Pulisci
                            </button>

                            <button type="submit" id="btn-invia" class="btn btn-primary">
                                Invia richiesta
                            </button>
                        </div>

                    </form>
                    <div id="azioni-convalida" class="d-none mt-3 text-center">
					    <a href="NuovaRichiesta.html" class="btn btn-primary">
					        Crea una nuova richiesta
					    </a>
					</div>

                </div>
            </div>

        </div>
    </div>

</main>

</body>
</html>
