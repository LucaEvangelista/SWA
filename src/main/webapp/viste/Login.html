<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Soccorso Web</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f6f9;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
        }
    </style>
</head>
<body>

<main class="container">
    <div class="card login-card mx-auto shadow-sm">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 text-center mb-2">Accedi</h1>
            <p class="text-secondary text-center mb-4">
                Inserisci le credenziali del tuo account.
            </p>

            <div id="messaggio-errore"
                 class="alert alert-danger d-none"
                 role="alert"></div>

            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        autocomplete="username"
                        required>
                    <div class="invalid-feedback">
                        Inserisci un indirizzo email valido.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>

                    <div class="input-group">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            required>

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            id="mostra-password">
                            Mostra
                        </button>

                        <div class="invalid-feedback">
                            Inserisci la password.
                        </div>
                    </div>
                </div>

                <button
                    type="submit"
                    id="pulsante-login"
                    class="btn btn-primary w-100">
                    <span id="testo-login">Accedi</span>
                    <span
                        id="spinner-login"
                        class="spinner-border spinner-border-sm ms-2 d-none"
                        aria-hidden="true"></span>
                </button>
            </form>
        </div>
    </div>
</main>

<script src="../js/SWAscript/Login.js"></script>
</body>
</html>
