<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nuovo operatore</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <script
        src="/soccorso_Web_SWA/js/SWAscript/NuovoOperatore.js"
        defer>
    </script>
</head>

<body class="bg-light">

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-12 col-md-9 col-lg-7">

                <div class="card shadow-sm border-0">

                    <div class="card-header bg-primary text-white py-3">
                        <h1 class="h4 mb-0">Creazione nuovo operatore</h1>
                    </div>

                    <div class="card-body p-4">

                        
                        <div
                            id="messaggio"
                            class="alert d-none"
                            role="alert">
                        </div>

                        <form id="form-nuovo-operatore" novalidate>

                            <div class="row">

                                <!-- Nome -->
                                <div class="col-md-6 mb-3">
                                    <label
                                        for="nome"
                                        class="form-label">
                                        Nome
                                    </label>

                                    <input
                                        type="text"
                                        id="nome"
                                        name="nome"
                                        class="form-control"
                                        maxlength="100"
                                        autocomplete="given-name"
                                        required>

                                    <div class="invalid-feedback">
                                        Inserisci il nome dell’operatore.
                                    </div>
                                </div>

                                
                                <div class="col-md-6 mb-3">
                                    <label
                                        for="cognome"
                                        class="form-label">
                                        Cognome
                                    </label>

                                    <input
                                        type="text"
                                        id="cognome"
                                        name="cognome"
                                        class="form-control"
                                        maxlength="100"
                                        autocomplete="family-name"
                                        required>

                                    <div class="invalid-feedback">
                                        Inserisci il cognome dell’operatore.
                                    </div>
                                </div>

                            </div>

                            
                            <div class="mb-3">
                                <label
                                    for="data-nascita"
                                    class="form-label">
                                    Data di nascita
                                </label>

                                <input
                                    type="date"
                                    id="data-nascita"
                                    name="dataNascita"
                                    class="form-control"
                                    autocomplete="bday"
                                    required>

                                <div class="invalid-feedback">
                                    Inserisci la data di nascita.
                                </div>
                            </div>

                            
                            <div class="mb-3">
                                <label
                                    for="email"
                                    class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    class="form-control"
                                    maxlength="255"
                                    autocomplete="email"
                                    required>

                                <div class="invalid-feedback">
                                    Inserisci un indirizzo email valido.
                                </div>
                            </div>

                            <div class="row">

                                
                                <div class="col-md-6 mb-3">
                                    <label
                                        for="passkey"
                                        class="form-label">
                                        Password temporanea
                                    </label>

                                    <input
                                        type="password"
                                        id="passkey"
                                        name="passkey"
                                        class="form-control"
                                        autocomplete="new-password"
                                        required>

                                    <div class="invalid-feedback">
                                        Inserisci una password temporanea.
                                    </div>
                                </div>

                               
                                <div class="col-md-6 mb-3">
                                    <label
                                        for="conferma-passkey"
                                        class="form-label">
                                        Conferma password
                                    </label>

                                    <input
                                        type="password"
                                        id="conferma-passkey"
                                        name="confermaPasskey"
                                        class="form-control"
                                        autocomplete="new-password"
                                        required>

                                    <div class="invalid-feedback">
                                        Conferma la password temporanea.
                                    </div>
                                </div>

                            </div>

                            
                            <div class="form-check mb-4">

                                <input
                                    type="checkbox"
                                    id="mostra-password"
                                    class="form-check-input">

                                <label
                                    for="mostra-password"
                                    class="form-check-label">
                                    Mostra password
                                </label>

                            </div>

                            <div class="d-flex justify-content-between gap-2">

                                <button
                                    type="button"
                                    class="btn btn-outline-secondary"
                                    onclick="history.back()">
                                    Indietro
                                </button>

                                <button
                                    type="submit"
                                    id="pulsante-crea"
                                    class="btn btn-primary">
                                    Crea operatore
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
