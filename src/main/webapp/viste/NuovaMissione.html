<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Crea nuova missione</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container-fluid mt-4">

        <!-- Titolo pagina -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">

            <div>
                <h1 class="h3 mb-0 text-gray-800">
                    Crea nuova missione
                </h1>
            </div>

            <a href="ListaRichieste.html" class="btn btn-primary btn-sm shadow-sm">
                Torna alla lista
            </a>

        </div>

        <!-- Messaggio caricamento -->
        <div id="messaggio-caricamento" class="alert alert-info">
            Caricamento dati in corso...
        </div>

        <!-- Messaggio errore -->
        <div id="messaggio-errore" class="alert alert-danger d-none"></div>

        <!-- Messaggio successo -->
        <div id="messaggio-successo" class="alert alert-success d-none"></div>


        <!-- Form creazione missione -->
        <form id="form-crea-missione" class="d-none">

            <input type="hidden" id="richiestaId">

            <!-- Riga informazioni richiesta -->
            <div class="row">

                <!-- CARD DATI RICHIESTA -->
                <div class="col-lg-8 col-md-10">

                    <div class="card shadow mb-4">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">
                                Dati richiesta
                            </h6>
                        </div>

                        <div class="card-body">

                            <div class="row mb-3">

                                <div class="col-md-4">
                                    <strong>ID richiesta:</strong>
                                    <p id="richiesta-id" class="mb-0"></p>
                                </div>

                                <div class="col-md-4">
                                    <strong>Nome persona:</strong>
                                    <p id="richiesta-nome" class="mb-0"></p>
                                </div>

                                <div class="col-md-4">
                                    <strong>Fase:</strong>
                                    <p id="richiesta-fase" class="mb-0"></p>
                                </div>

                            </div>

                            <div class="mb-3">
                                <strong>Email:</strong>
                                <p id="richiesta-email" class="mb-0"></p>
                            </div>

                            <div class="mb-3">
                                <label for="obiettivo" class="form-label">
                                    <strong>Obiettivo missione:</strong>
                                </label>
                                <textarea id="obiettivo"
                                          class="form-control"
                                          rows="3"
                                          required></textarea>
                            </div>

                            <div class="mb-0">
                                <label for="posizione" class="form-label">
                                    <strong>Posizione missione:</strong>
                                </label>
                                <input type="text"
                                       id="posizione"
                                       class="form-control"
                                       required>
                            </div>

                        </div>

                    </div>

                </div>

            </div>


            <!-- Riga squadra -->
            <div class="row">

                <div class="col-lg-8 col-md-10">

                    <div class="card shadow mb-4">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">
                                Squadra da assegnare
                            </h6>
                        </div>

                        <div class="card-body">

                            <div class="form-group">
                                <label for="squadraId" class="form-label">
                                    Squadra:
                                </label>

                                <select id="squadraId"
                                        class="form-control"
                                        required>
                                    <option value="">
                                        -- Seleziona una squadra --
                                    </option>
                                </select>
                            </div>

                        </div>

                    </div>

                </div>

            </div>


            <!-- Riga mezzi/materiali -->
            <div class="row">

                <!-- CARD MEZZI -->
                <div class="col-lg-6">

                    <div class="card shadow mb-4">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">
                                Mezzi da assegnare
                            </h6>
                        </div>

                        <div class="card-body" id="lista-mezzi">
                            <p class="text-muted mb-0">
                                Caricamento mezzi...
                            </p>
                        </div>

                    </div>

                </div>


                <!-- CARD MATERIALI -->
                <div class="col-lg-6">

                    <div class="card shadow mb-4">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">
                                Materiali da assegnare
                            </h6>
                        </div>

                        <div class="card-body" id="lista-materiali">
                            <p class="text-muted mb-0">
                                Caricamento materiali...
                            </p>
                        </div>

                    </div>

                </div>

            </div>


            <!-- Pulsanti -->
            <div class="d-flex justify-content-end mb-4">

                <a id="btn-annulla"
                   href="ListaRichieste.html"
                   class="btn btn-secondary me-2">
                    Annulla
                </a>

                <button id="btn-crea-missione"
                        type="submit"
                        class="btn btn-primary">
                    Crea missione
                </button>

            </div>

        </form>

    </div>


    <!-- JS -->
    <script src="/soccorso_Web_SWA/js/SWAscript/NuovaMissione.js"></script>

</body>
</html>
